<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#1C1C1E">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="筋トレ">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<title>筋トレ記録</title>
<style>
  :root{
    --bg:#F6F5F2; --card:#FFFFFF; --ink:#1C1C1E; --sub:#8A8A8E; --line:#ECEAE5;
    --soft:#F1EFEA; --radius:16px; --radius-sm:12px;
    --accent:#3F9D6B; --accent-bg:#DCEFE2; --accent-line:#BFE3CC;
    --shadow:0 1px 2px rgba(0,0,0,.04), 0 8px 22px rgba(0,0,0,.05);
    --shadow-sm:0 1px 3px rgba(0,0,0,.05);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; padding:0;}
  body{
    background:var(--bg); color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;
    touch-action:manipulation; -webkit-font-smoothing:antialiased;
    font-size:15px; line-height:1.45;
  }
  #app{ max-width:430px; margin:0 auto; min-height:100vh; position:relative; padding-top:env(safe-area-inset-top); }
  #main{ padding:0 16px calc(104px + env(safe-area-inset-bottom)); }
  #main.fade{ animation:fade .22s ease; }
  @keyframes fade{ from{opacity:0; transform:translateY(4px);} to{opacity:1; transform:none;} }
  h1{font-size:19px; font-weight:800; margin:0; letter-spacing:.01em;}
  .svgico{display:block; width:100%; height:100%;}
  .muted{color:var(--sub); font-size:13px;}
  .center{text-align:center;}
  .mt{margin-top:10px;} .mt2{margin-top:18px;}

  .head{
    position:sticky; top:0; z-index:20; background:var(--bg);
    display:flex; align-items:center; justify-content:space-between; gap:10px;
    padding:16px 4px 12px; margin-bottom:12px; min-height:60px;
  }
  .head .sub{font-size:12px; color:var(--sub); margin-top:2px;}
  .head-center{flex:1; text-align:center;}
  .head-date{font-weight:800; font-size:16px;}

  /* buttons */
  .btn{
    display:block; width:100%; background:var(--ink); color:#fff; border:none;
    padding:16px; font-size:16px; font-weight:800; font-family:inherit;
    min-height:54px; cursor:pointer; border-radius:var(--radius-sm);
    transition:transform .08s ease, opacity .15s; box-shadow:var(--shadow-sm);
  }
  .btn:active{transform:scale(.98);}
  .btn:disabled{opacity:.28; box-shadow:none;}
  .btn.secondary{background:#fff; color:var(--ink); box-shadow:none; border:1.5px solid var(--ink);}
  .btn.ghost{background:#fff; color:var(--sub); box-shadow:none; border:1.5px solid var(--line); font-weight:700;}
  .btn.danger{background:#fff; color:#c0392b; box-shadow:none; border:1.5px solid #e3b7b1;}
  .btn.sm{padding:10px 14px; font-size:13px; min-height:42px; width:auto; border-radius:999px;}
  .topbtn{
    background:var(--ink); color:#fff; border:none; font-family:inherit; font-weight:800;
    font-size:15px; padding:11px 22px; min-height:46px; cursor:pointer; border-radius:999px;
    transition:transform .08s, opacity .15s; box-shadow:var(--shadow-sm);
  }
  .topbtn:active{transform:scale(.97);} .topbtn:disabled{opacity:.28; box-shadow:none;}
  .iconbtn{background:#fff; border:1px solid var(--line); width:40px; height:40px; border-radius:999px; font-size:18px; color:var(--ink); cursor:pointer; line-height:1; box-shadow:var(--shadow-sm);}

  .card{background:var(--card); border-radius:var(--radius); padding:16px; margin-bottom:12px; box-shadow:var(--shadow-sm);}

  /* tab bar */
  #tabbar{
    position:fixed; bottom:0; left:50%; transform:translateX(-50%);
    width:100%; max-width:430px; background:rgba(255,255,255,.92); backdrop-filter:saturate(1.4) blur(10px);
    -webkit-backdrop-filter:saturate(1.4) blur(10px); border-top:1px solid var(--line);
    display:flex; z-index:60; padding-bottom:env(safe-area-inset-bottom);
  }
  body.session #tabbar{display:none;}
  #tabbar button{
    flex:1; background:none; border:none; padding:9px 0 7px; color:var(--sub);
    font-size:10.5px; font-weight:700; display:flex; flex-direction:column; align-items:center; gap:4px;
    font-family:inherit; cursor:pointer; min-height:54px; transition:color .15s;
  }
  #tabbar button .ic{width:24px; height:24px;}
  #tabbar button.active{color:var(--ink);}

  /* calendar */
  .cal-head{display:flex; align-items:center; justify-content:space-between; margin-bottom:10px;}
  .cal-title{font-size:17px; font-weight:800;}
  .cal-nav{background:#fff; border:1px solid var(--line); width:40px; height:40px; border-radius:999px; font-size:22px; color:var(--ink); cursor:pointer; line-height:1; box-shadow:var(--shadow-sm);}
  .cal-grid{display:grid; grid-template-columns:repeat(7,1fr); gap:5px;}
  .cal-wd{text-align:center; font-size:11px; color:var(--sub); padding:4px 0; font-weight:700;}
  .cal-cell{
    aspect-ratio:1/1; display:flex; align-items:center; justify-content:center; background:#fff;
    border-radius:11px; font-size:14px; cursor:pointer; position:relative; color:var(--ink);
    box-shadow:var(--shadow-sm); transition:transform .08s;
  }
  .cal-cell:active{transform:scale(.95);}
  .cal-cell.empty{background:transparent; box-shadow:none; cursor:default;}
  .cal-cell.today{font-weight:800;}
  .cal-cell.sel{outline:2px solid var(--ink); outline-offset:-2px;}
  .cal-cell.sun{color:#c0392b;} .cal-cell.sat{color:#2a6fb0;}
  .cal-dot{width:6px; height:6px; border-radius:50%; background:var(--ink); position:absolute; bottom:6px;}
  .cal-cell.has{background:var(--accent-bg);}
  .cal-cell.has.sel{outline-color:var(--accent);}
  .cal-check{position:absolute; bottom:3px; font-size:10px; line-height:1; color:var(--accent); font-weight:900;}
  .wd-sun{color:#c0392b;} .wd-sat{color:#2a6fb0;}

  .summary-ex{padding:11px 0; border-bottom:1px solid var(--line); display:flex; align-items:center; gap:12px;}
  .summary-ex:last-child{border-bottom:none;}
  .summary-ex .si{width:30px; height:30px; flex:0 0 auto; color:var(--ink);}
  .summary-ex .nm{font-weight:700; font-size:15px;}
  .summary-ex .cat{font-size:11px; color:var(--sub); margin-left:6px;}
  .summary-ex .sets{color:var(--sub); font-size:13px; margin-top:2px;}

  /* date picker pill */
  .date-pick{position:relative; display:flex; align-items:center; gap:10px; background:#fff; border-radius:var(--radius); padding:13px 16px; box-shadow:var(--shadow-sm); margin-bottom:14px;}
  .date-pick .dic{width:24px; height:24px; color:var(--ink); flex:0 0 auto;}
  .date-big{font-weight:800; font-size:16px; flex:1;}
  .date-caret{color:var(--sub); font-size:13px; font-weight:700;}
  .date-overlay{position:absolute; inset:0; opacity:0; width:100%; height:100%; border:0; margin:0; padding:0;}

  /* exercise selection */
  .cat-h{font-size:12px; color:var(--sub); font-weight:800; margin:20px 4px 8px; letter-spacing:.06em;}
  .ex-row{
    display:flex; align-items:center; gap:13px; background:#fff; border-radius:var(--radius);
    padding:12px 15px; margin-bottom:8px; min-height:58px; cursor:pointer;
    box-shadow:var(--shadow-sm); border:1.5px solid transparent; transition:border-color .15s, transform .08s;
  }
  .ex-row:active{transform:scale(.99);}
  .ex-row .ex-ic{width:34px; height:34px; flex:0 0 auto; color:var(--ink);}
  .ex-row .name{font-size:15px; font-weight:600; flex:1;}
  .ex-row .box{width:24px; height:24px; border-radius:8px; border:2px solid var(--line); flex:0 0 auto; display:flex; align-items:center; justify-content:center; color:#fff; font-size:15px;}
  .ex-row.sel{border-color:var(--ink);}
  .ex-row.sel .box{background:var(--ink); border-color:var(--ink);}

  /* session */
  .session-head{position:sticky; top:0;}
  .ex-card{background:#fff; border-radius:var(--radius); padding:14px 16px; margin-bottom:12px; box-shadow:var(--shadow-sm);}
  .ex-card-head{display:flex; align-items:center; gap:12px; cursor:pointer;}
  .ex-card-ic{width:38px; height:38px; flex:0 0 auto; color:var(--ink);}
  .ex-card-title{flex:1;}
  .ex-card-name{font-weight:800; font-size:16px;}
  .ex-card-cat{font-size:11px; color:var(--sub);}
  .ex-del{background:none; border:none; color:var(--sub); font-size:15px; width:30px; height:30px; cursor:pointer; flex:0 0 auto; line-height:1;}
  .ex-chk{width:28px; height:28px; border-radius:999px; border:2px solid var(--line); display:flex; align-items:center; justify-content:center; color:var(--sub); flex:0 0 auto; font-weight:800;}
  .ex-chk::after{content:'⌄'; font-size:16px; line-height:1; margin-top:-3px;}
  .ex-card:not(.collapsed) .ex-chk::after{content:'⌃'; margin-top:3px;}
  .ex-card.collapsed.done .ex-chk{background:var(--accent); border-color:var(--accent); color:#fff;}
  .ex-card.collapsed.done .ex-chk::after{content:'✓'; font-size:14px; margin-top:0;}
  .ex-hist{font-size:12px; color:var(--sub); margin-top:8px; line-height:1.5;}
  .ex-card-body{margin-top:6px;}
  .ex-card-sum{display:none; color:var(--sub); font-size:13px; padding-top:8px;}
  .ex-card.collapsed .ex-hist, .ex-card.collapsed .ex-card-body{display:none;}
  .ex-card.collapsed .ex-card-sum{display:block;}

  .set-block{margin-top:12px; padding-top:10px; border-top:1px dashed var(--line);}
  .set-block:first-child{border-top:none;}
  .set-label{font-size:13px; color:var(--ink); font-weight:800;}
  .field-label{font-size:11px; color:var(--sub); margin:9px 0 5px; font-weight:700;}
  .valrow{display:flex; align-items:center; gap:8px; margin:9px 0 5px;}
  .valnow{font-weight:800; color:var(--ink); font-size:16px;}
  .valtag{font-size:10px; color:var(--sub); background:var(--soft); padding:2px 8px; border-radius:999px; font-weight:700;}

  .barwrap{overflow-x:auto; -webkit-overflow-scrolling:touch; display:flex; gap:6px; padding:2px 0 6px; scrollbar-width:none; position:relative;}
  .barwrap::-webkit-scrollbar{display:none;}
  .chip{
    flex:0 0 auto; min-width:42px; height:40px; padding:0 11px; background:#fff; color:var(--sub);
    border:1.5px solid var(--line); border-radius:999px; font-size:15px; font-weight:800; cursor:pointer;
    display:flex; align-items:center; justify-content:center; font-family:inherit;
    transition:background .15s, color .15s, border-color .15s, transform .08s;
  }
  .chip:active{transform:scale(.94);}
  .chip.sel{background:var(--ink); color:#fff; border-color:var(--ink);}
  .repbar{display:flex; width:100%; border:1.5px solid var(--line); border-radius:12px; overflow:hidden; margin:2px 0 6px; background:#fff;}
  .repcell{flex:1 1 0; min-width:0; height:42px; border:none; border-left:1px solid var(--line); background:transparent; color:var(--sub); font-weight:800; font-size:13px; font-family:inherit; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:background .12s, color .12s;}
  .repcell:first-child{border-left:none;}
  .repcell.sel{background:var(--ink); color:#fff;}

  .save-bar{position:fixed; left:50%; transform:translateX(-50%); bottom:0; width:100%; max-width:430px; z-index:60;
    padding:14px 16px calc(14px + env(safe-area-inset-bottom)); background:linear-gradient(to top, var(--bg) 72%, rgba(246,245,242,0));}

  /* inputs */
  label.lbl{display:block; font-size:12px; color:var(--sub); font-weight:700; margin:16px 4px 6px;}
  input[type=text],input[type=password],input[type=number]{width:100%; padding:14px; border:1.5px solid var(--line); border-radius:var(--radius-sm); font-size:16px; font-family:inherit; background:#fff; color:var(--ink);}
  select{width:100%; padding:14px; border:1.5px solid var(--line); border-radius:var(--radius-sm); font-size:16px; font-family:inherit; background:#fff; color:var(--ink); -webkit-appearance:none;}
  .inline-num{display:flex; gap:12px;}
  .inline-num>div{flex:1;}

  .chart-box{position:relative; height:240px; margin-top:8px;}
  .banner{background:#fff; border-radius:var(--radius); box-shadow:var(--shadow-sm); padding:13px 15px; font-size:13px; margin-bottom:14px; display:flex; gap:10px; align-items:center; justify-content:space-between; border:1.5px solid var(--ink);}
  .banner.warn{border-color:#c0392b; color:#c0392b;}

  #toast{position:fixed; left:50%; bottom:96px; transform:translateX(-50%) translateY(8px); background:var(--ink); color:#fff; padding:13px 22px; border-radius:999px; font-size:14px; font-weight:700; opacity:0; transition:opacity .25s, transform .25s; pointer-events:none; z-index:200; max-width:88%; text-align:center; box-shadow:var(--shadow);}
  #toast.show{opacity:.97; transform:translateX(-50%) translateY(0);}
  #overlay{position:fixed; inset:0; background:rgba(246,245,242,.6); display:none; align-items:center; justify-content:center; z-index:150;}
  #overlay.show{display:flex;}
  .spinner{width:38px; height:38px; border:3px solid var(--line); border-top-color:var(--ink); border-radius:50%; animation:spin .8s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}

  /* add-exercise sheet */
  #sheet{position:fixed; inset:0; z-index:120;}
  #sheet .sheet-back{position:absolute; inset:0; background:rgba(0,0,0,.28); opacity:0; transition:opacity .2s;}
  #sheet.show .sheet-back{opacity:1;}
  #sheet .sheet-panel{position:absolute; left:50%; bottom:0; transform:translateX(-50%) translateY(100%); width:100%; max-width:430px; background:var(--bg); border-radius:22px 22px 0 0; max-height:82vh; display:flex; flex-direction:column; transition:transform .26s cubic-bezier(.2,.8,.2,1); padding-bottom:env(safe-area-inset-bottom); box-shadow:0 -8px 30px rgba(0,0,0,.12);}
  #sheet.show .sheet-panel{transform:translateX(-50%) translateY(0);}
  .sheet-head{display:flex; align-items:center; justify-content:space-between; padding:16px;}
  .sheet-head .t{font-weight:800; font-size:16px;}
  .sheet-list{overflow-y:auto; -webkit-overflow-scrolling:touch; padding:0 16px 6px;}
  .sheet-foot{padding:12px 16px;}
  .add-row{display:flex; align-items:center; gap:12px; background:#fff; border-radius:12px; padding:11px 14px; margin:8px 0; box-shadow:var(--shadow-sm); cursor:pointer;}
  .add-row .ex-ic{width:30px; height:30px; color:var(--ink); flex:0 0 auto;}
  .add-row .name{flex:1; font-size:15px;}
  .add-row input{width:22px; height:22px; accent-color:var(--accent);}
</style>
</head>
<body>
<div id="app">
  <main id="main"></main>
  <nav id="tabbar"></nav>
</div>
<div id="toast"></div>
<div id="overlay"><div class="spinner"></div></div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script>
/* ============================================================
   筋トレ記録 PWA
   ============================================================ */
const EXERCISES = {
  '胸':  ['ベンチプレス','インクラインベンチプレス','インクラインダンベルプレス','スミスマシンインクラインベンチプレス','デクラインベンチプレス','デクラインスミスマシンベンチプレス','チェストマシン','チェストフライマシン','ペックデッキフライ','ダンベルフライ','ケーブルクロスオーバー','ディップス'],
  '脚':  ['スクワット','スミスマシンスクワット','レッグエクステンション','ヒップアブダクションマシン','アダクター（内もも）'],
  '肩':  ['アーノルドプレス','ダンベルショルダープレス','ショルダープレスマシン'],
  '背中':['ラットプルダウン','ローローマシン','懸垂','チェストサポーテッドTバーロウ'],
  '腕':  ['ダンベルカール','シーテッドカール','ダンベルフレンチプレス'],
  '腹':  ['トーソローテーション','トルソーローテーションマシン','アブドミナルクランチマシン','アブドミナルヒップレイズ','レッグレイズ'],
};
const CATEGORIES = ['胸','脚','肩','背中','腕','腹'];
const SUPPORT_EXERCISES = ['懸垂','ディップス','レッグレイズ'];
const ASSIST_EXERCISES = ['懸垂','ディップス'];
function isAssist(name){ return ASSIST_EXERCISES.includes(name); }
const WD = ['日','月','火','水','木','金','土'];
const KG_OPTIONS = []; for (let v=2.5; v<=100.0001; v+=2.5) KG_OPTIONS.push(Math.round(v*10)/10);
const KG_OPTIONS_DB = []; for (let v=2; v<=100.0001; v+=2) KG_OPTIONS_DB.push(v);
const REP_OPTIONS = []; for (let r=1; r<=15; r++) REP_OPTIONS.push(r);
const DUMBBELL_EXERCISES = new Set(['ダンベルフライ','ダンベルカール','シーテッドカール','ダンベルフレンチプレス','ダンベルショルダープレス','アーノルドプレス','インクラインダンベルプレス']);
function isDumbbell(name){ return DUMBBELL_EXERCISES.has(name); }

/* ---- icons (生成済み) ---- */
const ICON = {

  machine: '<rect x="20" y="26" width="4" height="58" rx="2" fill="currentColor"/><rect x="76" y="26" width="4" height="58" rx="2" fill="currentColor"/><rect x="46" y="12" width="8" height="18" rx="3" fill="currentColor"/><rect x="28" y="30" width="44" height="9" rx="3" fill="currentColor"/><rect x="28" y="43" width="44" height="9" rx="3" fill="currentColor"/><rect x="28" y="56" width="44" height="9" rx="3" fill="currentColor"/><rect x="28" y="69" width="44" height="9" rx="3" fill="currentColor"/>',
  cable: '<rect x="46" y="9" width="8" height="7" rx="2" fill="currentColor"/><circle cx="50" cy="25" r="12" fill="currentColor"/><circle cx="50" cy="25" r="4.5" fill="#fff"/><rect x="48" y="35" width="4" height="25" rx="2" fill="currentColor"/><rect x="34" y="60" width="32" height="8" rx="4" fill="currentColor"/><rect x="36" y="66" width="4" height="11" rx="2" fill="currentColor"/><rect x="60" y="66" width="4" height="11" rx="2" fill="currentColor"/>',
  smith: '<rect x="26" y="12" width="5" height="72" rx="2" fill="currentColor"/><rect x="69" y="12" width="5" height="72" rx="2" fill="currentColor"/><rect x="20" y="44" width="60" height="8" rx="4" fill="currentColor"/><rect x="16" y="39" width="7" height="18" rx="3" fill="currentColor"/><rect x="77" y="39" width="7" height="18" rx="3" fill="currentColor"/>',
  squat: '<rect x="26" y="22" width="48" height="6" rx="3" fill="currentColor"/><circle cx="26" cy="25" r="7" fill="currentColor"/><circle cx="74" cy="25" r="7" fill="currentColor"/><circle cx="50" cy="14" r="8" fill="currentColor"/><g fill="none" stroke="currentColor" stroke-width="11" stroke-linecap="round" stroke-linejoin="round"><path d="M50 30 L50 46 M50 46 L41 57 L41 80 M50 46 L59 57 L59 80"/></g>',
  shoulder_press: '<circle cx="50" cy="26" r="8" fill="currentColor"/><g fill="none" stroke="currentColor" stroke-width="11" stroke-linecap="round" stroke-linejoin="round"><path d="M50 34 L50 60 M50 60 L40 80 M50 60 L60 80 M50 40 L36 32 L36 17 M50 40 L64 32 L64 17"/></g><rect x="28" y="10" width="16" height="9" rx="3" fill="currentColor"/><rect x="26" y="7" width="4" height="15" rx="2" fill="currentColor"/><rect x="42" y="7" width="4" height="15" rx="2" fill="currentColor"/><rect x="56" y="10" width="16" height="9" rx="3" fill="currentColor"/><rect x="54" y="7" width="4" height="15" rx="2" fill="currentColor"/><rect x="70" y="7" width="4" height="15" rx="2" fill="currentColor"/>',

/* ---- date utils ---- */
function pad(n){ return String(n).padStart(2,'0'); }
function dateStr(d){ return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate()); }
function todayStr(){ return dateStr(new Date()); }
function parseDate(s){ const [y,m,d]=s.split('-').map(Number); return new Date(y,m-1,d); }
function startOfMonth(d){ return new Date(d.getFullYear(), d.getMonth(), 1); }
function fmtJp(s){ const d=parseDate(s); return (d.getMonth()+1)+'月'+d.getDate()+'日（'+WD[d.getDay()]+'）'; }
function fmtMd(s){ const d=parseDate(s); return (d.getMonth()+1)+'/'+d.getDate(); }
function fmtKg(n){ return String(n); }

/* ---- base64 (UTF-8) ---- */
function utf8ToBase64(str){
  const bytes=new TextEncoder().encode(str); let bin=''; const chunk=0x8000;
  for(let i=0;i<bytes.length;i+=chunk){ bin+=String.fromCharCode.apply(null, bytes.subarray(i,i+chunk)); }
  return btoa(bin);
}
function base64ToUtf8(b64){
  const bin=atob(b64.replace(/\s/g,'')); const bytes=Uint8Array.from(bin,c=>c.charCodeAt(0));
  return new TextDecoder().decode(bytes);
}

/* ---- cache ---- */
function cacheRecords(){ try{ localStorage.setItem('gym_records', JSON.stringify(state.records)); }catch(e){} }
function loadCache(){ try{ state.records=JSON.parse(localStorage.getItem('gym_records')||'{}')||{}; }catch(e){ state.records={}; } }

/* ---- GitHub API ---- */
function ghUrl(){ return 'https://api.github.com/repos/'+state.repo+'/contents/data/records.json'; }
function ghHeaders(){ return { 'Authorization':'Bearer '+state.token, 'Accept':'application/vnd.github+json', 'X-GitHub-Api-Version':'2022-11-28' }; }
async function ghLoad(){
  if(!state.token||!state.repo) throw new Error('未設定');
  const res=await fetch(ghUrl(),{headers:ghHeaders(),cache:'no-store'});
  if(res.status===404){ state.records={}; await ghSave('init data/records.json'); return; }
  if(res.status===401) throw new Error('トークンが無効です（401）');
  if(!res.ok) throw new Error('読み込み失敗 ('+res.status+')');
  const data=await res.json();
  let parsed={}; try{ parsed=JSON.parse(base64ToUtf8(data.content||'')||'{}'); }catch(e){ parsed={}; }
  state.records=parsed.records||{}; state.pendingSync=false; cacheRecords();
}
async function ghSave(message){
  if(!state.token||!state.repo) throw new Error('トークンとリポジトリを設定してください');
  let sha=null;
  const getRes=await fetch(ghUrl(),{headers:ghHeaders(),cache:'no-store'});
  if(getRes.ok){ const d=await getRes.json(); sha=d.sha; }
  else if(getRes.status===401){ throw new Error('トークンが無効です（401）'); }
  else if(getRes.status!==404){ throw new Error('SHA取得失敗 ('+getRes.status+')'); }
  const body={ message: message||('update '+new Date().toISOString()), content: utf8ToBase64(JSON.stringify({records:state.records},null,2)) };
  if(sha) body.sha=sha;
  const res=await fetch(ghUrl(),{method:'PUT',headers:{...ghHeaders(),'Content-Type':'application/json'},body:JSON.stringify(body)});
  if(!res.ok){ let msg=res.status; try{ const t=await res.json(); if(t.message) msg+=' '+t.message; }catch(e){} throw new Error('保存失敗 ('+msg+')'); }
  state.pendingSync=false; cacheRecords();
}

/* ---- session build ---- */
function lastRecordOf(exercise, excludeDate){
  const dates=Object.keys(state.records).filter(d=>d!==excludeDate).sort().reverse();
  for(const d of dates){ const w=(state.records[d].workouts||[]).find(w=>w.exercise===exercise); if(w) return w; }
  return null;
}
function prevRecordOf(exercise, excludeDate){
  const dates=Object.keys(state.records).filter(d=>d!==excludeDate).sort().reverse();
  for(const d of dates){ const w=(state.records[d].workouts||[]).find(w=>w.exercise===exercise); if(w) return {date:d, sets:w.sets}; }
  return null;
}
function maxKgOf(exercise){ let m=0; Object.values(state.records).forEach(day=>(day.workouts||[]).forEach(w=>{ if(w.exercise===exercise)(w.sets||[]).forEach(s=>{ if((s.kg||0)>m)m=s.kg; }); })); return m; }
function maxRepsOf(exercise){ let m=0; Object.values(state.records).forEach(day=>(day.workouts||[]).forEach(w=>{ if(w.exercise===exercise)(w.sets||[]).forEach(s=>{ if((s.reps||0)>m)m=s.reps; }); })); return m; }
function setsText(sets, support){ return (sets||[]).map(s=>((support&&!s.kg)?'自重':fmtKg(s.kg)+'kg')+'×'+s.reps).join(' / '); }
function histLine(name, support, excludeDate){
  const prev=prevRecordOf(name, excludeDate); const parts=[];
  parts.push(prev ? ('前回 '+fmtMd(prev.date)+'　'+setsText(prev.sets, support)) : '前回 ―');
  if(support){ const mr=maxRepsOf(name); if(mr) parts.push('最高 '+mr+'回'); }
  else { const mk=maxKgOf(name); if(mk) parts.push('最高 '+fmtKg(mk)+'kg'); }
  return parts.join('　•　');
}
function buildSets(exercise, support, date, existingWorkout){
  let base;
  if(existingWorkout&&existingWorkout.sets&&existingWorkout.sets.length) base=existingWorkout.sets;
  else { const prev=lastRecordOf(exercise,date); base=prev?prev.sets:null; }
  const def={ kg: support?0:20, reps:10 }; const sets=[];
  for(let i=0;i<3;i++){ const src=base?(base[i]||base[base.length-1]):def; sets.push({ kg:(src.kg===undefined?def.kg:src.kg), reps:(src.reps===undefined?def.reps:src.reps) }); }
  return sets;
}
function startSession(date, exerciseNames, includeRunning, existingDay){
  const items=[];
  CATEGORIES.forEach(cat=>EXERCISES[cat].forEach(ex=>{
    if(exerciseNames.includes(ex)){
      const support=SUPPORT_EXERCISES.includes(ex);
      const ex0=existingDay&&existingDay.workouts?existingDay.workouts.find(w=>w.exercise===ex):null;
      items.push({ type:'exercise', exercise:ex, category:cat, support, sets:buildSets(ex,support,date,ex0), collapsed:true, touched:false });
    }
  }));
  if(includeRunning||(existingDay&&existingDay.running)){
    const r=(existingDay&&existingDay.running)?existingDay.running:{incline:'',duration:''};
    items.push({ type:'running', incline:r.incline, duration:r.duration, collapsed:true, touched:false });
  }
  if(items.length===0){ toast('種目を選択してください'); return; }
  state.session={ date, items, editing:!!existingDay };
  go('session');
}
function editSession(date){
  const day=state.records[date]||{}; const names=(day.workouts||[]).map(w=>w.exercise);
  startSession(date, names, !!day.running, day);
}
function categoryOf(ex){ for(const c of CATEGORIES){ if(EXERCISES[c].includes(ex)) return c; } return ''; }
function reorderSession(){
  const s=state.session; if(!s) return;
  const ex=s.items.filter(i=>i.type==='exercise'), run=s.items.filter(i=>i.type==='running');
  ex.sort((a,b)=>(CATEGORIES.indexOf(a.category)*100+EXERCISES[a.category].indexOf(a.exercise))-(CATEGORIES.indexOf(b.category)*100+EXERCISES[b.category].indexOf(b.exercise)));
  s.items=[...ex,...run];
}
function openAddSheet(){
  const s=state.session; if(!s) return;
  const present=new Set(s.items.filter(i=>i.type==='exercise').map(i=>i.exercise));
  const runPresent=s.items.some(i=>i.type==='running');
  let list='';
  CATEGORIES.forEach(cat=>{
    const avail=EXERCISES[cat].filter(ex=>!present.has(ex));
    if(!avail.length) return;
    list+='<div class="cat-h">'+cat+'</div>';
    avail.forEach(ex=>{ list+='<label class="add-row"><span class="ex-ic">'+svgIcon(exIconKey(ex))+'</span><span class="name">'+esc(ex)+'</span><input type="checkbox" value="'+esc(ex)+'"></label>'; });
  });
  if(!runPresent) list+='<div class="cat-h">有酸素</div><label class="add-row"><span class="ex-ic">'+svgIcon('running')+'</span><span class="name">ランニング</span><input type="checkbox" value="__run__"></label>';
  if(!list) list='<div class="muted center" style="padding:28px 0">追加できる種目はありません</div>';
  const sheet=document.createElement('div');
  sheet.id='sheet';
  sheet.innerHTML='<div class="sheet-back"></div><div class="sheet-panel"><div class="sheet-head"><span class="t">種目を追加</span><button class="iconbtn" data-x>✕</button></div><div class="sheet-list">'+list+'</div><div class="sheet-foot"><button class="btn" data-add>追加する</button></div></div>';
  document.body.appendChild(sheet);
  requestAnimationFrame(()=>sheet.classList.add('show'));
  const close=()=>{ sheet.classList.remove('show'); setTimeout(()=>sheet.remove(),220); };
  sheet.querySelector('[data-x]').onclick=close;
  sheet.querySelector('.sheet-back').onclick=close;
  sheet.querySelector('[data-add]').onclick=()=>{
    const checked=[...sheet.querySelectorAll('input:checked')].map(c=>c.value); let added=0;
    checked.forEach(v=>{
      if(v==='__run__'){ if(!s.items.some(i=>i.type==='running')){ s.items.push({type:'running',incline:'',duration:'',collapsed:true,touched:false}); added++; } }
      else { const support=SUPPORT_EXERCISES.includes(v); s.items.push({type:'exercise',exercise:v,category:categoryOf(v),support,sets:buildSets(v,support,s.date,null),collapsed:true,touched:false}); added++; }
    });
    close();
    if(added){ reorderSession(); render(); toast(added+'種目を追加しました'); }
  };
}

/* ============================================================
   3. トレーニング実施（1ページ縦並び）
   ============================================================ */
function kgOptionsFor(item){
  let opts = isDumbbell(item.exercise) ? KG_OPTIONS_DB.slice() : KG_OPTIONS.slice();
  if(item.support) opts=[0].concat(opts);
  return opts;
}
function chipBar(idx, si, item){
  const cur=item.sets[si].kg;
  const chips=kgOptionsFor(item).map(o=>{
    const sel=Math.abs(o-cur)<0.001?' sel':''; const label=(o===0?'自重':fmtKg(o));
    return '<button class="chip'+sel+'" data-val="'+o+'">'+label+'</button>';
  }).join('');
  return '<div class="barwrap" data-idx="'+idx+'" data-set="'+si+'" data-kind="kg">'+chips+'</div>';
}
function repBar(idx, si, item){
  const cur=item.sets[si].reps;
  const cells=REP_OPTIONS.map(o=>('<button class="repcell'+(o===cur?' sel':'')+'" data-val="'+o+'">'+o+'</button>')).join('');
  return '<div class="repbar" data-idx="'+idx+'" data-set="'+si+'">'+cells+'</div>';
}
function kgText(kg, support){ if(support&&(!kg||kg===0)) return '自重'; return fmtKg(kg)+' kg'; }
function valKg(kg, support){ return (support&&(!kg||kg===0)) ? '自重' : fmtKg(kg)+'kg'; }
function valReps(r){ return r+'回'; }
function runSummary(it){ return '傾斜 '+(it.incline||0)+' ／ '+(it.duration||0)+'分'; }
function cardClasses(it){ return 'ex-card'+(it.collapsed?' collapsed':'')+(it.collapsed&&it.touched?' done':''); }
function cardHead(it, idx, iconKey, name){
  return '<div class="ex-card-head" data-toggle="'+idx+'"><span class="ex-card-ic">'+svgIcon(iconKey)+'</span><div class="ex-card-title"><div class="ex-card-name">'+esc(name)+'</div><div class="ex-card-cat">'+esc(it.type==='running'?'有酸素':it.category)+'</div></div><button class="ex-del" data-del="'+idx+'">✕</button><span class="ex-chk"></span></div>';
}
function exerciseCard(it, idx, date){
  let body='';
  for(let si=0;si<3;si++){
    const set=it.sets[si];
    body+='<div class="set-block"><div class="set-label">セット'+(si+1)+'</div>'+
      '<div class="valrow"><span class="valnow" id="v-'+idx+'-'+si+'-kg">'+valKg(set.kg,it.support)+'</span>'+(isAssist(it.exercise)?'<span class="valtag">サポート</span>':'')+'</div>'+chipBar(idx,si,it)+
      '<div class="valrow"><span class="valnow" id="v-'+idx+'-'+si+'-reps">'+valReps(set.reps)+'</span></div>'+repBar(idx,si,it)+
      '</div>';
  }
  return '<div class="'+cardClasses(it)+'" data-idx="'+idx+'">'+cardHead(it,idx,exIconKey(it.exercise),it.exercise)+'<div class="ex-hist">'+histLine(it.exercise,it.support,date)+'</div><div class="ex-card-body">'+body+'</div><div class="ex-card-sum">'+setsText(it.sets,it.support)+'</div></div>';
}
function runningCard(it, idx){
  return '<div class="'+cardClasses(it)+'" data-idx="'+idx+'">'+cardHead(it,idx,'running','ランニング')+'<div class="ex-card-body"><div class="inline-num"><div><div class="field-label">傾斜</div><input type="number" id="r-incline" inputmode="decimal" step="0.5" placeholder="例: 3.5" value="'+(it.incline??'')+'"></div><div><div class="field-label">時間（分）</div><input type="number" id="r-duration" inputmode="numeric" step="1" placeholder="例: 20" value="'+(it.duration??'')+'"></div></div></div><div class="ex-card-sum">'+runSummary(it)+'</div></div>';
}
function renderSession(m){
  const s=state.session; if(!s){ go('calendar'); return; }
  let cards=''; s.items.forEach((it,idx)=>{ cards+= it.type==='running'?runningCard(it,idx):exerciseCard(it,idx,s.date); });
  m.innerHTML=
    '<div class="head session-head"><button class="iconbtn" data-act="cancel">✕</button><div class="head-center"><div class="head-date">'+fmtJp(s.date)+'</div><div class="sub">'+s.items.length+' 種目</div></div><div style="width:40px"></div></div>'+
    cards+
    '<button class="btn ghost" id="addEx">＋ 種目を追加</button>'+
    '<div class="save-bar"><button class="btn" data-act="save">保存する</button></div>';
  function centerBars(root){ root.querySelectorAll('.barwrap').forEach(bar=>{ const sel=bar.querySelector('.chip.sel'); if(sel) bar.scrollLeft=sel.offsetLeft-bar.clientWidth/2+sel.clientWidth/2; }); }
  // chip interactions
  m.querySelectorAll('.barwrap').forEach(bar=>{
    bar.addEventListener('click',e=>{
      const chip=e.target.closest('.chip'); if(!chip) return;
      const idx=+bar.dataset.idx, si=+bar.dataset.set, kind=bar.dataset.kind, val=parseFloat(chip.dataset.val), it=s.items[idx];
      if(kind==='kg') it.sets[si].kg=val; else it.sets[si].reps=val;
      bar.querySelectorAll('.chip').forEach(c=>c.classList.toggle('sel',c===chip));
      const lab=document.getElementById('v-'+idx+'-'+si+'-'+kind);
      if(lab) lab.textContent = kind==='kg'?valKg(val,it.support):valReps(val);
    });
  });
  // collapse / expand (+ done mark)
  m.querySelectorAll('[data-toggle]').forEach(head=>{
    head.addEventListener('click',e=>{
      if(e.target.closest('.ex-del')) return;
      const idx=+head.dataset.toggle, it=s.items[idx], card=head.closest('.ex-card');
      if(it.collapsed){ it.collapsed=false; it.touched=true; }
      else { it.collapsed=true; card.querySelector('.ex-card-sum').textContent = it.type==='running'?runSummary(it):setsText(it.sets,it.support); }
      card.classList.toggle('collapsed', it.collapsed);
      card.classList.toggle('done', it.collapsed && it.touched);
      if(!it.collapsed) centerBars(card);
    });
  });
  // reps segmented bar
  m.querySelectorAll('.repbar').forEach(bar=>{
    bar.addEventListener('click',e=>{
      const cell=e.target.closest('.repcell'); if(!cell) return;
      const idx=+bar.dataset.idx, si=+bar.dataset.set, val=parseInt(cell.dataset.val,10), it=s.items[idx];
      it.sets[si].reps=val;
      bar.querySelectorAll('.repcell').forEach(c=>c.classList.toggle('sel',c===cell));
      const lab=document.getElementById('v-'+idx+'-'+si+'-reps');
      if(lab) lab.textContent=valReps(val);
    });
  });
  // delete a card (確認あり)
  m.querySelectorAll('.ex-del').forEach(b=>b.addEventListener('click',e=>{
    e.stopPropagation();
    const idx=+b.dataset.del, it=s.items[idx], name=it.type==='running'?'ランニング':it.exercise;
    if(!confirm('「'+name+'」を削除しますか？')) return;
    s.items.splice(idx,1); render();
  }));
  // add exercises
  const addb=$('#addEx',m); if(addb) addb.onclick=openAddSheet;
  // running inputs
  const ri=$('#r-incline',m), rd=$('#r-duration',m);
  if(ri){ const it=s.items.find(x=>x.type==='running'); ri.addEventListener('input',e=>it.incline=e.target.value); rd.addEventListener('input',e=>it.duration=e.target.value); }
  centerBars(m);
  $('[data-act=cancel]',m).onclick=()=>{ if(confirm('記録を中断しますか？（保存していない内容は失われます）')){ state.session=null; go('calendar'); } };
  $('[data-act=save]',m).onclick=saveSession;
}
async function saveSession(){
  const s=state.session; if(!s) return; const date=s.date;
  const day=state.records[date]?JSON.parse(JSON.stringify(state.records[date])):{workouts:[]};
  if(!day.workouts) day.workouts=[];
  s.items.forEach(it=>{
    if(it.type==='exercise'){
      const w={ exercise:it.exercise, category:it.category, sets:it.sets.map(st=>({ kg: it.support?(st.kg||0):st.kg, reps:st.reps })) };
      const idx=day.workouts.findIndex(x=>x.exercise===it.exercise);
      if(idx>=0) day.workouts[idx]=w; else day.workouts.push(w);
    } else {
      const inc=parseFloat(it.incline), dur=parseFloat(it.duration);
      if(!isNaN(inc)||!isNaN(dur)) day.running={ incline:isNaN(inc)?0:inc, duration:isNaN(dur)?0:dur };
    }
  });
  state.records[date]=day; cacheRecords();
  setLoading(true);
  try{ await ghSave('workout '+date); toast('保存しました'); }
  catch(e){ state.pendingSync=true; toast('オフライン保存（後で再同期）: '+e.message); }
  finally{ setLoading(false); }
  state.session=null; state.selection.clear(); state.runningSelected=false;
  state.calMonth=startOfMonth(parseDate(date)); go('calendar');
}

/* ============================================================
   5. レポート
   ============================================================ */
function renderReport(m){
  m.innerHTML=
    '<div class="head"><h1>レポート</h1></div>'+
    '<div class="card"><div style="font-weight:800;margin-bottom:2px">部位別トレーニング頻度</div><div class="muted" style="margin-bottom:8px">直近30日間</div><div id="freq-wrap"></div></div>'+
    '<div class="card"><div style="font-weight:800;margin-bottom:2px">種目別の重量推移</div><div class="muted" style="margin-bottom:8px">直近3ヶ月・最大重量</div><div id="prog-select"></div><div id="prog-wrap"></div></div>';
  renderFreqChart(); renderProgSection();
}
function freqData(){
  const inRange=new Set(); for(let i=0;i<30;i++){ const d=new Date(); d.setDate(d.getDate()-i); inRange.add(dateStr(d)); }
  const counts={}; CATEGORIES.forEach(c=>counts[c]=0);
  Object.keys(state.records).forEach(d=>{ if(!inRange.has(d))return; const cats=new Set((state.records[d].workouts||[]).map(w=>w.category)); cats.forEach(c=>{ if(counts[c]!==undefined)counts[c]++; }); });
  return counts;
}
function renderFreqChart(){
  const wrap=$('#freq-wrap'); if(!wrap) return; const counts=freqData(); const vals=CATEGORIES.map(c=>counts[c]); const total=vals.reduce((a,b)=>a+b,0);
  if(total===0){ wrap.innerHTML='<div class="muted center" style="padding:20px 0">まだ記録がありません</div>'; return; }
  if(typeof Chart==='undefined'){ wrap.innerHTML='<div class="muted center" style="padding:20px 0">グラフを読み込めません（オフライン）</div>'; return; }
  const max=Math.max(...vals); const colors=vals.map(v=>(v===max&&v>0)?'#1C1C1E':'#D6D3CC');
  wrap.innerHTML='<div class="chart-box"><canvas id="freqCanvas"></canvas></div>';
  state.charts.freq=new Chart($('#freqCanvas'),{ type:'bar', data:{ labels:CATEGORIES, datasets:[{ data:vals, backgroundColor:colors, borderWidth:0, borderRadius:8, barThickness:22 }] },
    options:{ indexAxis:'y', responsive:true, maintainAspectRatio:false, plugins:{ legend:{display:false} }, scales:{ x:{ beginAtZero:true, ticks:{precision:0,color:'#8A8A8E'}, grid:{color:'#EEE'} }, y:{ ticks:{color:'#1C1C1E',font:{weight:'700'}}, grid:{display:false} } } } });
}
function exercisesWithData(){ const set=new Set(); Object.values(state.records).forEach(day=>(day.workouts||[]).forEach(w=>set.add(w.exercise))); const out=[]; CATEGORIES.forEach(c=>EXERCISES[c].forEach(ex=>{ if(set.has(ex))out.push(ex); })); return out; }
function progData(ex){
  const cutoff=new Date(); cutoff.setMonth(cutoff.getMonth()-3); const cs=dateStr(cutoff); const points=[];
  Object.keys(state.records).sort().forEach(d=>{ if(d<cs)return; const w=(state.records[d].workouts||[]).find(w=>w.exercise===ex); if(w&&w.sets&&w.sets.length) points.push({x:d,y:Math.max(...w.sets.map(s=>s.kg||0))}); });
  return points;
}
function renderProgSection(){
  const selWrap=$('#prog-select'), wrap=$('#prog-wrap'); if(!selWrap||!wrap) return; const list=exercisesWithData();
  if(list.length===0){ selWrap.innerHTML=''; wrap.innerHTML='<div class="muted center" style="padding:20px 0">まだ記録がありません</div>'; return; }
  if(!state.progExercise||!list.includes(state.progExercise)) state.progExercise=list[0];
  selWrap.innerHTML='<select id="progSel">'+list.map(ex=>'<option value="'+esc(ex)+'"'+(ex===state.progExercise?' selected':'')+'>'+esc(ex)+'</option>').join('')+'</select>';
  $('#progSel').onchange=e=>{ state.progExercise=e.target.value; renderProgChart(); };
  renderProgChart();
}
function renderProgChart(){
  const wrap=$('#prog-wrap'); if(!wrap) return; if(state.charts.prog){ state.charts.prog.destroy(); state.charts.prog=null; }
  const points=progData(state.progExercise);
  if(points.length===0){ wrap.innerHTML='<div class="muted center" style="padding:20px 0">この種目の記録がありません</div>'; return; }
  if(typeof Chart==='undefined'){ wrap.innerHTML='<div class="muted center" style="padding:20px 0">グラフを読み込めません（オフライン）</div>'; return; }
  wrap.innerHTML='<div class="chart-box"><canvas id="progCanvas"></canvas></div>';
  state.charts.prog=new Chart($('#progCanvas'),{ type:'line', data:{ labels:points.map(p=>p.x.slice(5)), datasets:[{ data:points.map(p=>p.y), borderColor:'#1C1C1E', backgroundColor:'#1C1C1E', tension:.25, pointRadius:3, pointBackgroundColor:'#1C1C1E', borderWidth:2, fill:false }] },
    options:{ responsive:true, maintainAspectRatio:false, plugins:{ legend:{display:false}, tooltip:{callbacks:{label:c=>c.parsed.y+' kg'}} }, scales:{ y:{ beginAtZero:false, ticks:{precision:0,color:'#8A8A8E'}, grid:{color:'#EEE'} }, x:{ ticks:{color:'#8A8A8E',maxRotation:0,autoSkip:true,maxTicksLimit:6}, grid:{display:false} } } } });
}

/* ============================================================
   6. 設定
   ============================================================ */
function renderSettings(m){
  m.innerHTML=
    '<div class="head"><h1>設定</h1></div>'+
    '<label class="lbl">GitHub アクセストークン</label><input type="password" id="in-token" placeholder="ghp_xxx / github_pat_xxx" value="'+esc(state.token)+'" autocomplete="off">'+
    '<label class="lbl">リポジトリ名（user/repo）</label><input type="text" id="in-repo" placeholder="culapy1995/training" value="'+esc(state.repo)+'" autocomplete="off">'+
    '<div class="mt"><button class="btn" data-act="savecfg">保存して接続</button></div>'+
    '<div class="mt"><button class="btn ghost" data-act="reload">GitHubから再読み込み</button></div>'+
    (state.pendingSync?'<div class="mt"><button class="btn secondary" data-act="sync">未同期データを再同期</button></div>':'')+
    '<div class="cat-h">バックアップ</div>'+
    '<button class="btn secondary" data-act="export">JSONエクスポート</button>'+
    '<div class="mt"><button class="btn secondary" data-act="import">JSONインポート</button></div>'+
    '<input type="file" id="file-import" accept="application/json,.json" style="display:none">'+
    '<div class="cat-h">データ</div>'+
    '<button class="btn danger" data-act="reset">全データをリセット</button>'+
    '<div class="card mt2"><div class="muted">記録日数: '+Object.keys(state.records).length+' 日</div><div class="muted">接続: '+(state.token?'設定済み':'未設定')+'</div><div class="muted" style="margin-top:6px;font-size:11px">※ トークンは端末内(localStorage)にのみ保存され、Contents の読み書き権限が必要です。</div></div>';
  $('[data-act=savecfg]',m).onclick=()=>{ state.token=$('#in-token',m).value.trim(); state.repo=$('#in-repo',m).value.trim(); localStorage.setItem('gym_token',state.token); localStorage.setItem('gym_repo',state.repo); if(!state.token||!state.repo){ toast('トークンとリポジトリを入力してください'); return; } reloadFromGitHub(); };
  $('[data-act=reload]',m).onclick=reloadFromGitHub;
  const sy=$('[data-act=sync]',m); if(sy) sy.onclick=manualSync;
  $('[data-act=export]',m).onclick=exportJSON;
  $('[data-act=import]',m).onclick=()=>$('#file-import',m).click();
  $('#file-import',m).onchange=importJSON;
  $('[data-act=reset]',m).onclick=async()=>{ if(!confirm('本当に全データをリセットしますか？この操作は元に戻せません。'))return; state.records={}; cacheRecords(); setLoading(true); try{ await ghSave('reset records'); toast('リセットしました'); }catch(e){ state.pendingSync=true; toast('ローカルのみリセット: '+e.message); }finally{ setLoading(false); render(); } };
}
async function reloadFromGitHub(){ if(!state.token||!state.repo){ toast('未設定です'); return; } setLoading(true); try{ await ghLoad(); toast('読み込みました'); }catch(e){ toast('読み込み失敗: '+e.message); }finally{ setLoading(false); render(); } }
async function manualSync(){ setLoading(true); try{ await ghSave('manual sync'); toast('再同期しました'); }catch(e){ toast('同期失敗: '+e.message); }finally{ setLoading(false); render(); } }
function exportJSON(){ const blob=new Blob([JSON.stringify({records:state.records},null,2)],{type:'application/json'}); const url=URL.createObjectURL(blob); const a=document.createElement('a'); a.href=url; a.download='records-'+todayStr()+'.json'; document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url); }
function importJSON(e){
  const file=e.target.files[0]; if(!file)return; const reader=new FileReader();
  reader.onload=async()=>{ try{ const parsed=JSON.parse(reader.result); const recs=parsed.records||parsed; if(typeof recs!=='object'||recs===null) throw new Error('形式が不正です'); if(!confirm('現在のデータを置き換えてインポートしますか？'))return; state.records=recs; cacheRecords(); setLoading(true); try{ await ghSave('import records'); toast('インポートしました'); }catch(err){ state.pendingSync=true; toast('ローカルにインポート: '+err.message); }finally{ setLoading(false); render(); } }catch(err){ toast('インポート失敗: '+err.message); } };
  reader.readAsText(file); e.target.value='';
}

/* ---- swipe ---- */
function attachSwipe(el,onLeft,onRight){
  if(!el)return; let x0=null,y0=null;
  el.addEventListener('touchstart',e=>{ const t=e.touches[0]; x0=t.clientX; y0=t.clientY; },{passive:true});
  el.addEventListener('touchend',e=>{ if(x0===null)return; const t=e.changedTouches[0]; const dx=t.clientX-x0,dy=t.clientY-y0; if(Math.abs(dx)>55&&Math.abs(dx)>Math.abs(dy)*1.5){ if(dx<0)onLeft(); else onRight(); } x0=null;y0=null; },{passive:true});
}

/* ---- init ---- */
async function init(){
  loadCache(); setupTabs(); render();
  if(state.token&&state.repo){ setLoading(true); try{ await ghLoad(); }catch(e){ toast('オフライン表示: '+e.message); }finally{ setLoading(false); render(); } }
  if('serviceWorker' in navigator){ window.addEventListener('load',()=>{ navigator.serviceWorker.register('service-worker.js').catch(()=>{}); }); }
}
init();
</script>
